<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>├░┼╕┬дтАУ AdsPower Bot Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .stat-number {
            font-size: 3em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .online { color: #00ff88; }
        .offline { color: #ff4757; }
        .working { color: #ffa502; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .panel h2 {
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .bot-card {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .bot-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .status-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            right: 10px;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        
        .status-dot.offline {
            background: #ff4757;
            box-shadow: 0 0 10px #ff4757;
            animation: none;
        }
        
        .status-dot.working {
            background: #ffa502;
            box-shadow: 0 0 10px #ffa502;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        .bot-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .bot-task {
            font-size: 0.8em;
            opacity: 0.7;
        }
        
        .bot-stats {
            font-size: 0.75em;
            margin-top: 8px;
            opacity: 0.6;
        }
        
        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-family: monospace;
            font-size: 0.9em;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #00ff88;
        }
        
        textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
        }
        
        .btn-primary:hover {
            box-shadow: 0 5px 20px rgba(0,255,136,0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff3344);
            color: #fff;
        }
        
        .btn-danger:hover {
            box-shadow: 0 5px 20px rgba(255,71,87,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .login-queue {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .login-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85em;
        }
        
        .login-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        
        .login-status.pending { background: rgba(255,165,2,0.3); color: #ffa502; }
        .login-status.assigned { background: rgba(0,136,255,0.3); color: #0088ff; }
        .login-status.success { background: rgba(0,255,136,0.3); color: #00ff88; }
        .login-status.failed { background: rgba(255,71,87,0.3); color: #ff4757; }
        
        .logs-panel {
            grid-column: 1 / -1;
        }
        
        .logs {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85em;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 5px;
        }
        
        .log-entry.success { background: rgba(0,255,136,0.1); }
        .log-entry.error { background: rgba(255,71,87,0.1); }
        .log-entry.info { background: rgba(0,136,255,0.1); }
        
        .last-update {
            text-align: center;
            opacity: 0.5;
            font-size: 0.8em;
            margin-top: 20px;
        }
        
        .no-bots {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>├░┼╕┬дтАУ AdsPower Bot Dashboard</h1>
        
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-number online" id="online-count">0</div>
                <div class="stat-label">Online Bots</div>
            </div>
            <div class="stat-box">
                <div class="stat-number offline" id="offline-count">0</div>
                <div class="stat-label">Offline Bots</div>
            </div>
            <div class="stat-box">
                <div class="stat-number working" id="working-count">0</div>
                <div class="stat-label">Working</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="total-tasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
        </div>
        
        <div class="grid">
            <!-- Bots Panel -->
            <div class="panel">
                <h2>├░┼╕тАЬ┬б Connected Bots</h2>
                <div class="bot-grid" id="bot-grid">
                    <div class="no-bots">No bots connected yet...</div>
                </div>
            </div>
            
            <!-- Login Credentials Panel -->
            <div class="panel">
                <h2>├░┼╕тАЭ┬Р Login Credentials</h2>
                <textarea id="logins-input" placeholder="Enter logins (one per line):&#10;email@guerrillamail.com|password123|recovery@mail.com&#10;email2@guerrillamail.com|pass456|recovery2@mail.com"></textarea>
                <div class="btn-row">
                    <button class="btn-primary" onclick="addLogins()">├в┼╛тАв Add Logins</button>
                    <button class="btn-primary" onclick="sendToAllBots()">├░┼╕┼бтВм Send to All Bots</button>
                    <button class="btn-danger" onclick="clearLogins()">├░┼╕тАФтАШ├п┬╕┬П Clear All</button>
                </div>
                
                <h3 style="margin-top: 20px; margin-bottom: 10px; font-size: 1em;">├░┼╕тАЬтА╣ Login Queue</h3>
                <div class="login-queue" id="login-queue">
                    <!-- Login items will be added here -->
                </div>
            </div>
            
            <!-- Logs Panel -->
            <div class="panel logs-panel">
                <h2>├░┼╕тАЬ┼У Activity Logs</h2>
                <div class="logs" id="logs">
                    <div class="log-entry info">[System] Dashboard started. Waiting for bot connections...</div>
                </div>
            </div>
        </div>
        
        <div class="last-update">Last update: <span id="last-update">Never</span></div>
    </div>
    
    <script>
        // ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р
        // ├░┼╕тАЬ┼а DASHBOARD JAVASCRIPT
        // ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р
        
        const API_BASE = window.location.origin;
        
        // Fetch and update status
        async function updateStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                
                updateBotGrid(data.bots);
                updateLoginQueue(data.login_queue);
                updateStats(data.bots);
                
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }
        
        function updateBotGrid(bots) {
            const grid = document.getElementById('bot-grid');
            const botIds = Object.keys(bots);
            
            if (botIds.length === 0) {
                grid.innerHTML = '<div class="no-bots">No bots connected yet...</div>';
                return;
            }
            
            grid.innerHTML = botIds.map(botId => {
                const bot = bots[botId];
                const statusClass = bot.status || 'offline';
                const loggedIn = bot.adspower_logged_in ? '├в┼УтАж' : '├в┬Э┼Т';
                
                return `
                    <div class="bot-card">
                        <div class="status-dot ${statusClass}"></div>
                        <div class="bot-name">${bot.rdp_name || botId}</div>
                        <div class="bot-task">${bot.current_task || 'Idle'}</div>
                        <div class="bot-stats">
                            Tasks: ${bot.tasks_completed || 0}<br>
                            AdsPower: ${loggedIn}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function updateLoginQueue(queue) {
            const container = document.getElementById('login-queue');
            
            if (!queue || queue.length === 0) {
                container.innerHTML = '<div style="opacity:0.5; text-align:center; padding:20px;">No logins in queue</div>';
                return;
            }
            
            container.innerHTML = queue.map(login => `
                <div class="login-item">
                    <span>${login.email}</span>
                    <span class="login-status ${login.status}">${login.status}</span>
                </div>
            `).join('');
        }
        
        function updateStats(bots) {
            const botList = Object.values(bots);
            
            const online = botList.filter(b => b.status === 'online' || b.status === 'idle').length;
            const offline = botList.filter(b => b.status === 'offline').length;
            const working = botList.filter(b => b.current_task && b.current_task !== 'idle').length;
            const totalTasks = botList.reduce((sum, b) => sum + (b.tasks_completed || 0), 0);
            
            document.getElementById('online-count').textContent = online;
            document.getElementById('offline-count').textContent = offline;
            document.getElementById('working-count').textContent = working;
            document.getElementById('total-tasks').textContent = totalTasks;
        }
        
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logs.innerHTML = `<div class="log-entry ${type}">[${time}] ${message}</div>` + logs.innerHTML;
        }
        
        // API Actions
        async function addLogins() {
            const input = document.getElementById('logins-input');
            const logins = input.value.trim();
            
            if (!logins) {
                addLog('No logins entered!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/logins`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ logins })
                });
                const data = await response.json();
                
                if (data.success) {
                    addLog(`Added ${data.added} logins to queue`, 'success');
                    input.value = '';
                    updateStatus();
                }
            } catch (error) {
                addLog('Error adding logins: ' + error, 'error');
            }
        }
        
        async function sendToAllBots() {
            try {
                const response = await fetch(`${API_BASE}/api/send_logins`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                if (data.success) {
                    addLog(`Sent logins to ${data.assigned} bots (${data.online_bots} online)`, 'success');
                    updateStatus();
                }
            } catch (error) {
                addLog('Error sending logins: ' + error, 'error');
            }
        }
        
        async function clearLogins() {
            if (!confirm('Clear all logins from queue?')) return;
            
            try {
                await fetch(`${API_BASE}/api/clear_logins`, { method: 'POST' });
                addLog('Login queue cleared', 'info');
                updateStatus();
            } catch (error) {
                addLog('Error clearing logins: ' + error, 'error');
            }
        }
        
        // Auto-refresh every 3 seconds
        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
